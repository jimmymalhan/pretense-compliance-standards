name: Run Tests

on:
    push:
        branches:
          - 'main'
    pull_request:
        branches:
          - 'main'
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.10'

            - name: Install dependencies
              run: uv sync
            # The Pretense Compliance Standards suite is the project's deliverable.
            - name: Run Pretense Compliance Standards tests
              run: uv run pytest tests/test_pcs.py -v
