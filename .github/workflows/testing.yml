name: Run Tests

on:
    push:
        branches:
          - 'main'
    pull_request:
        branches:
          - 'main'
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                enable-cache: true

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.10'

            - name: Install dependencies
              run: uv sync
            # This fork's deliverable is the Pretense Compliance Standards suite.
            # CI gates on that suite; the upstream FinanceDatabase tests have
            # pre-existing data-drift failures (symbol collisions, stale snapshots)
            # unrelated to this suite and are not run here.
            - name: Run Pretense Compliance Standards tests
              run: uv run pytest tests/test_pcs.py -v
